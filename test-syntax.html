<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语法测试页面</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
    </style>
</head>
<body>
    <h1>语法测试页面</h1>
    <p>测试 deepseek-analyzer.js 的语法错误</p>
    
    <div id="test-results">
        <div class="test-result">正在加载测试...</div>
    </div>

    <script>
        // 测试函数
        function testSyntax() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '';
            
            // 测试1: 加载config.js
            try {
                const configScript = document.createElement('script');
                configScript.src = 'config.js';
                configScript.onload = () => {
                    addTestResult('✓ config.js 加载成功', 'success');
                    testDeepseekAnalyzer();
                };
                configScript.onerror = () => {
                    addTestResult('✗ config.js 加载失败', 'error');
                    // 继续测试，可能config.js在另一个文件中
                    testDeepseekAnalyzer();
                };
                document.head.appendChild(configScript);
            } catch (error) {
                addTestResult('✗ config.js 加载异常: ' + error.message, 'error');
                testDeepseekAnalyzer();
            }
        }
        
        function testDeepseekAnalyzer() {
            // 测试2: 加载deepseek-analyzer.js
            try {
                const analyzerScript = document.createElement('script');
                analyzerScript.src = 'deepseek-analyzer.js';
                analyzerScript.onload = () => {
                    addTestResult('✓ deepseek-analyzer.js 加载成功', 'success');
                    testClassDefinition();
                };
                analyzerScript.onerror = (e) => {
                    addTestResult('✗ deepseek-analyzer.js 加载失败', 'error');
                    console.error('加载失败详情:', e);
                };
                document.head.appendChild(analyzerScript);
            } catch (error) {
                addTestResult('✗ deepseek-analyzer.js 加载异常: ' + error.message, 'error');
            }
        }
        
        function testClassDefinition() {
            // 测试3: 检查类定义
            try {
                if (typeof DeepseekAnalyzer === 'function') {
                    addTestResult('✓ DeepseekAnalyzer 类已定义', 'success');
                    testInstanceCreation();
                } else {
                    addTestResult('✗ DeepseekAnalyzer 类未定义', 'error');
                }
            } catch (error) {
                addTestResult('✗ 检查类定义失败: ' + error.message, 'error');
            }
        }
        
        function testInstanceCreation() {
            // 测试4: 创建实例
            try {
                const analyzer = new DeepseekAnalyzer();
                if (analyzer) {
                    addTestResult('✓ DeepseekAnalyzer 实例创建成功', 'success');
                    testMethods();
                } else {
                    addTestResult('✗ DeepseekAnalyzer 实例创建失败', 'error');
                }
            } catch (error) {
                addTestResult('✗ 创建实例失败: ' + error.message, 'error');
                console.error('实例创建错误:', error);
            }
        }
        
        function testMethods() {
            // 测试5: 检查方法
            try {
                const analyzer = new DeepseekAnalyzer();
                const methods = [
                    'analyzeCustomer',
                    'analyzeCustomersBatch',
                    'callDeepseekAPI',
                    'callProxyAPI',
                    'callDirectAPI',
                    'generateMockAnalysis'
                ];
                
                let allMethodsExist = true;
                methods.forEach(method => {
                    if (typeof analyzer[method] === 'function') {
                        addTestResult(`✓ ${method}() 方法存在`, 'success');
                    } else {
                        addTestResult(`✗ ${method}() 方法不存在`, 'error');
                        allMethodsExist = false;
                    }
                });
                
                if (allMethodsExist) {
                    addTestResult('✓ 所有方法都存在', 'success');
                }
                
            } catch (error) {
                addTestResult('✗ 检查方法失败: ' + error.message, 'error');
            }
        }
        
        function addTestResult(message, type) {
            const resultsDiv = document.getElementById('test-results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `test-result ${type}`;
            resultDiv.textContent = message;
            resultsDiv.appendChild(resultDiv);
            console.log(`${type === 'success' ? '✓' : '✗'} ${message}`);
        }
        
        // 开始测试
        testSyntax();
    </script>
</body>
</html>
